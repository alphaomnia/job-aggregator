name: Daily Job Aggregator

on:
  schedule:
    # 06:00 UTC = 07:00 Prague winter / 08:00 Prague summer
    - cron: "0 6 * * *"
  workflow_dispatch:  # lets you trigger manually from the Actions tab

permissions:
  contents: write  # so the workflow can commit jobs.json back to the repo

jobs:
  aggregate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run aggregator
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          DASHBOARD_URL: ${{ vars.DASHBOARD_URL || 'https://example.github.io/job-aggregator/' }}
        run: python main.py

      - name: Commit updated jobs.json and dashboard
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "Job Aggregator Bot"
          git add docs/jobs.json docs/index.html
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: daily aggregator run ($(date -u +%Y-%m-%d))"
            git push
          fi
