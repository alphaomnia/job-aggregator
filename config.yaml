# Your search preferences. Edit freely; the orchestrator reloads this every run.

# Role keywords - jobs whose title or description matches more of these score higher.
# Group them by weight so a "Chief Product Officer" beats a generic "Product Manager".
roles:
  # Strong matches (weight 10)
  strong:
    - "Chief Product Officer"
    - "CPO"
    - "VP of Product"
    - "VP Product"
    - "Head of Product"
    - "Director of Product"
    - "Director, Product"
    - "Fractional CPO"
    - "Fractional Chief Product"
    - "Interim CPO"
    - "Interim Head of Product"
    - "Product Coach"

  # Good matches (weight 5)
  good:
    - "Senior Product Manager"
    - "Lead Product Manager"
    - "Principal Product Manager"
    - "Group Product Manager"
    - "Product Lead"
    - "Product Coach"
    - "Product Operations Manager"
    - "Product Ops"

  # Avoid - explicit negative signals (penalty -20, effectively excludes)
  avoid:
    - "Junior"
    - "Intern"
    - "Graduate"
    - "Associate Product Manager"
    - "Working student"

# Location preferences - in priority order.
# Czech Republic > EU remote > Global remote.
locations:
  priority:
    - "Czech Republic"
    - "Czechia"
    - "Prague"
    - "Praha"
  acceptable:
    - "EU"
    - "Europe"
    - "EMEA"
    - "European Union"
    - "Remote"
    - "Worldwide"

# Remote / hybrid / on-site preference.
# Include = will appear in results. Exclude = will be filtered out.
work_modes:
  include:
    - "remote"
    - "hybrid"
    - "on-site"  # only matters for Prague-based roles
  prefer:
    - "remote"
    - "hybrid"

# Contract types you're open to.
contract_types:
  - "full-time"
  - "contract"
  - "freelance"
  - "fractional"
  - "interim"
  - "part-time"

# Seniority floor - skip anything obviously below this.
min_seniority: "senior"  # one of: junior, mid, senior, lead, director, vp, c-level

# How many days back to consider a posting "fresh"
max_age_days: 14

# Minimum score for a job to be included in the email digest.
# Tune this after the first few days - if you get too few/too many.
digest_score_threshold: 15

# How many top new matches to include in each digest email (the rest are just on the dashboard).
digest_max_jobs: 20

# Sources to enable. Only the sources that actually return data are listed —
# the rest 403 / return 0 every run (Cloudflare, React SPAs, moved endpoints),
# wasting the run budget and burying real failures in log noise. Their adapter
# code is kept in adapters/ for reference; re-enable one only after verifying it
# works (see CLAUDE.md for the per-adapter status).
adapters:
  - remotive          # official JSON API
  - weworkremotely    # RSS feeds
  - workingnomads     # JSON endpoint
  - generic           # reads sources.yaml (add your own RSS/JSON-LD/JSON sources there)
  - gmail_alerts      # ingests LinkedIn (+ future) job-alert emails via IMAP; no-ops until GMAIL_* secrets are set

# Disabled — known-broken, do not re-enable without verifying:
#   himalayas, jobgether        -> 403 Cloudflare
#   startupjobs_cz, welcometothejungle, theorg, talent_cz -> React SPA, no static HTML
#   dynamitejobs                -> returns 0
#   eustartups, freelancermap   -> RSS endpoint 404 / moved
