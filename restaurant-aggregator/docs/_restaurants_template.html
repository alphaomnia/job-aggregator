<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prague Restaurants - Daily Edition</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,700;9..144,900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root { --paper: #faf8f3; --ink: #1a1a1a; --ink-mid: #4a4a48; --ink-faint: #8a8884; --rule: #d4cfc2; --accent: #a83232; --accent-soft: #f3e8e6; --gold: #b8862a; --sage: #3a6b4a; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: var(--paper); color: var(--ink); font-family: 'Fraunces', Georgia, serif; line-height: 1.5; min-height: 100vh; }
    body::before { content: ""; position: fixed; inset: 0; background-image: radial-gradient(rgba(0,0,0,0.015) 1px, transparent 1px); background-size: 3px 3px; pointer-events: none; z-index: 0; }
    .page { max-width: 1280px; margin: 0 auto; padding: 32px 40px 80px; position: relative; z-index: 1; }
    .masthead { border-top: 4px double var(--ink); border-bottom: 1px solid var(--ink); padding: 16px 0; margin-bottom: 4px; display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 24px; }
    .masthead .left, .masthead .right { font-family: 'Inter', sans-serif; font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-mid); }
    .masthead .right { text-align: right; }
    .masthead-title { text-align: center; }
    .masthead-title h1 { font-size: clamp(28px, 5vw, 52px); font-weight: 900; line-height: 1.05; letter-spacing: -0.02em; }
    .masthead-title .subtitle { font-family: 'Inter', sans-serif; font-size: 11px; color: var(--ink-mid); letter-spacing: 0.1em; text-transform: uppercase; margin-top: 4px; }
    .filter-bar { background: white; border: 1px solid var(--rule); border-radius: 8px; padding: 16px 20px; margin: 20px 0; display: flex; flex-wrap: wrap; gap: 12px; align-items: flex-end; }
    .filter-group { display: flex; flex-direction: column; gap: 4px; }
    .filter-group label { font-family: 'Inter', sans-serif; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-faint); }
    .filter-group input, .filter-group select { font-family: 'Inter', sans-serif; font-size: 13px; border: 1px solid var(--rule); border-radius: 4px; padding: 6px 10px; background: var(--paper); color: var(--ink); min-width: 140px; }
    .filter-group input:focus, .filter-group select:focus { outline: 2px solid var(--gold); outline-offset: -1px; }
    .pill-row { display: flex; gap: 4px; flex-wrap: wrap; }
    .pill { font-family: 'Inter', sans-serif; font-size: 12px; padding: 4px 12px; border: 1px solid var(--rule); border-radius: 20px; cursor: pointer; background: var(--paper); color: var(--ink-mid); transition: all 0.1s; }
    .pill.active { background: var(--ink); color: white; border-color: var(--ink); }
    .pill:hover:not(.active) { border-color: var(--ink-mid); }
    .filter-actions { margin-left: auto; display: flex; gap: 8px; align-items: flex-end; }
    .btn-reset { font-family: 'Inter', sans-serif; font-size: 12px; padding: 6px 14px; border: 1px solid var(--rule); border-radius: 4px; cursor: pointer; background: transparent; color: var(--ink-mid); }
    .btn-reset:hover { border-color: var(--ink-mid); color: var(--ink); }
    .stats-bar { font-family: 'Inter', sans-serif; font-size: 12px; color: var(--ink-faint); padding: 8px 0 16px; border-bottom: 1px solid var(--rule); margin-bottom: 20px; }
    .stats-bar strong { color: var(--ink-mid); }
    .cards { display: flex; flex-direction: column; }
    .card { display: grid; grid-template-columns: 48px 1fr auto; gap: 0 20px; padding: 18px 0; border-bottom: 1px solid var(--rule); align-items: start; }
    .card:last-child { border-bottom: none; }
    .card-num { font-family: 'Inter', sans-serif; font-size: 13px; color: var(--ink-faint); padding-top: 3px; text-align: right; }
    .card-name { font-size: 18px; font-weight: 700; line-height: 1.2; margin-bottom: 4px; }
    .card-name a { color: var(--ink); text-decoration: none; }
    .card-name a:hover { color: var(--accent); }
    .card-address { font-family: 'Inter', sans-serif; font-size: 12px; color: var(--ink-faint); margin-bottom: 6px; }
    .card-meta { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; margin-bottom: 6px; }
    .tag { font-family: 'Inter', sans-serif; font-size: 11px; padding: 2px 8px; border-radius: 3px; background: var(--accent-soft); color: var(--accent); }
    .tag.neighborhood { background: #eef4f0; color: var(--sage); }
    .tag.source { background: #f0f0f0; color: var(--ink-mid); }
    .price-dots { font-size: 12px; color: var(--gold); letter-spacing: 1px; }
    .card-hours { font-family: 'Inter', sans-serif; font-size: 11px; color: var(--ink-faint); margin-top: 2px; }
    .card-actions { display: flex; gap: 6px; margin-top: 8px; }
    .action-btn { font-family: 'Inter', sans-serif; font-size: 11px; padding: 3px 10px; border: 1px solid var(--rule); border-radius: 3px; cursor: pointer; background: transparent; color: var(--ink-mid); transition: all 0.1s; }
    .action-btn:hover { border-color: var(--gold); color: var(--gold); }
    .action-btn.active-want { border-color: var(--gold); color: var(--gold); background: #fdf8ec; }
    .action-btn.active-visited { border-color: var(--sage); color: var(--sage); background: #eef4f0; }
    .action-btn.active-dismiss { border-color: var(--ink-faint); color: var(--ink-faint); }
    .card-right { text-align: right; min-width: 80px; }
    .rating-num { font-size: 28px; font-weight: 700; line-height: 1; color: var(--gold); }
    .rating-num.no-rating { color: var(--ink-faint); font-size: 18px; }
    .review-count { font-family: 'Inter', sans-serif; font-size: 11px; color: var(--ink-faint); margin-top: 2px; }
    .first-seen { font-family: 'Inter', sans-serif; font-size: 11px; color: var(--ink-faint); margin-top: 6px; }
    .badge-new { font-family: 'Inter', sans-serif; font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; background: var(--accent); color: white; padding: 2px 6px; border-radius: 2px; display: inline-block; margin-top: 4px; }
    .empty-state { text-align: center; padding: 60px 20px; color: var(--ink-faint); font-family: 'Inter', sans-serif; }
    .source-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; }
    .source-dot.google_places { background: #4285F4; }
    .source-dot.openstreetmap { background: #7EBC6F; }
    .source-dot.foursquare { background: #F94877; }
    @media (max-width: 640px) { .page { padding: 16px 16px 60px; } .card { grid-template-columns: 36px 1fr; } .card-right { display: none; } .filter-bar { flex-direction: column; } }
  </style>
</head>
<body>
<div class="page">
  <div class="masthead">
    <div class="left">Prague - Restaurants</div>
    <div class="masthead-title"><h1>Prague Eats</h1><div class="subtitle">Restaurant Discovery - Updated Daily</div></div>
    <div class="right" id="mastheadDate">-</div>
  </div>
  <div class="filter-bar">
    <div class="filter-group"><label>Search</label><input type="text" id="filterSearch" placeholder="name, cuisine, neighborhood..." /></div>
    <div class="filter-group"><label>Cuisine</label><select id="filterCuisine"><option value="">All cuisines</option></select></div>
    <div class="filter-group"><label>Neighborhood</label><select id="filterNeighborhood"><option value="">All neighborhoods</option></select></div>
    <div class="filter-group"><label>Price</label><div class="pill-row" id="priceFilter"><button class="pill active" data-val="">All</button><button class="pill" data-val="1">E</button><button class="pill" data-val="2">EE</button><button class="pill" data-val="3">EEE</button><button class="pill" data-val="4">EEEE</button></div></div>
    <div class="filter-group"><label>Min. Rating</label><input type="number" id="filterRating" min="0" max="5" step="0.5" value="0" style="width:70px" /></div>
    <div class="filter-group"><label>Status</label><div class="pill-row" id="statusFilter"><button class="pill active" data-val="">All</button><button class="pill" data-val="new">New</button><button class="pill" data-val="want_to_visit">Want to visit</button><button class="pill" data-val="visited">Visited</button><button class="pill" data-val="hide_dismissed">Hide dismissed</button></div></div>
    <div class="filter-group"><label>Sort by</label><select id="filterSort"><option value="rating">Rating (high to low)</option><option value="newest">Newest first</option><option value="name">Name (A-Z)</option><option value="reviews">Most reviewed</option></select></div>
    <div class="filter-group"><label>Source</label><select id="filterSource"><option value="">All sources</option><option value="google_places">Google Maps</option><option value="openstreetmap">OpenStreetMap</option><option value="foursquare">Foursquare</option></select></div>
    <div class="filter-actions"><button class="btn-reset" id="btnReset">Reset filters</button></div>
  </div>
  <div class="stats-bar" id="statsBar">Loading...</div>
  <div class="cards" id="cards"></div>
</div>
<script>
const DATA_URL='restaurants.json',LS_KEY='restaurants_user_states_v1';
let allRestaurants=[],userStates={},generatedAt='';
try{userStates=JSON.parse(localStorage.getItem(LS_KEY)||'{}');}catch{}
function saveUserStates(){try{localStorage.setItem(LS_KEY,JSON.stringify(userStates));}catch{}}
function setUserStatus(id,status){userStates[id]=status;saveUserStates();renderCards(filteredRestaurants());}
function getUserStatus(id){return userStates[id]||'new';}
function priceDisplay(level){if(!level)return '';return '<span class="price-dots">'+'E'.repeat(level)+'<span style="color:var(--rule)">'+'E'.repeat(4-level)+'</span></span>';}
function sourceBadge(source){const labels={google_places:'Google Maps',openstreetmap:'OpenStreetMap',foursquare:'Foursquare'};return `<span class="source-dot ${source}"></span>${labels[source]||source}`;}
function isNew(d){if(!d)return false;const c=new Date();c.setDate(c.getDate()-14);return new Date(d)>=c;}
function formatDate(iso){if(!iso)return '';try{return new Date(iso).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});}catch{return iso;}}
function populateFilters(restaurants){const cuisines=new Set(),neighborhoods=new Set();for(const r of restaurants){for(const c of(r.cuisine||[]))if(c)cuisines.add(c);if(r.neighborhood)neighborhoods.add(r.neighborhood);}const cs=document.getElementById('filterCuisine');[...cuisines].sort().forEach(c=>{const o=document.createElement('option');o.value=c;o.textContent=c;cs.appendChild(o);});const ns=document.getElementById('filterNeighborhood');[...neighborhoods].sort().forEach(n=>{const o=document.createElement('option');o.value=n;o.textContent=n;ns.appendChild(o);});}
function getFilters(){return{search:document.getElementById('filterSearch').value.toLowerCase().trim(),cuisine:document.getElementById('filterCuisine').value,neighborhood:document.getElementById('filterNeighborhood').value,price:document.querySelector('#priceFilter .pill.active')?.dataset.val||'',minRating:parseFloat(document.getElementById('filterRating').value)||0,status:document.querySelector('#statusFilter .pill.active')?.dataset.val||'',sort:document.getElementById('filterSort').value,source:document.getElementById('filterSource').value};}
function filteredRestaurants(){const f=getFilters();return allRestaurants.filter(r=>{const status=getUserStatus(r.id);if(f.status==='hide_dismissed'&&status==='dismissed')return false;if(f.status&&f.status!=='hide_dismissed'&&status!==f.status)return false;if(f.source&&r.source!==f.source)return false;if(f.price&&String(r.price_level)!==f.price)return false;if(f.minRating&&r.rating<f.minRating)return false;if(f.cuisine&&!(r.cuisine||[]).includes(f.cuisine))return false;if(f.neighborhood&&r.neighborhood!==f.neighborhood)return false;if(f.search){const h=[r.name,r.address,r.neighborhood,...(r.cuisine||[]),...(r.tags||[])].join(' ').toLowerCase();if(!h.includes(f.search))return false;}return true;}).sort((a,b)=>{if(f.sort==='rating')return(b.rating||0)-(a.rating||0);if(f.sort==='newest')return(b.first_seen||'').localeCompare(a.first_seen||'');if(f.sort==='name')return(a.name||'').localeCompare(b.name||'');if(f.sort==='reviews')return(b.review_count||0)-(a.review_count||0);return 0;});}
function renderCards(restaurants){const container=document.getElementById('cards'),stats=document.getElementById('statsBar');if(!restaurants.length){container.innerHTML='<div class="empty-state"><p>No restaurants match your filters.</p></div>';stats.innerHTML='No results';return;}stats.innerHTML=`Showing <strong>${restaurants.length}</strong> of <strong>${allRestaurants.length}</strong> restaurants &middot; Updated ${formatDate(generatedAt.split('T')[0])}`;container.innerHTML=restaurants.map((r,i)=>{const status=getUserStatus(r.id),link=r.google_maps_url||r.website||'#';const cuisineTags=(r.cuisine||[]).slice(0,3).map(c=>`<span class="tag">${c}</span>`).join('');const neighborhoodTag=r.neighborhood?`<span class="tag neighborhood">${r.neighborhood}</span>`:'';const sourceTag=`<span class="tag source">${sourceBadge(r.source)}</span>`;const price=priceDisplay(r.price_level);const newBadge=isNew(r.first_seen)?'<span class="badge-new">New</span>':'';const hoursText=r.opening_hours?.weekday_text?.length?`<div class="card-hours">Today: ${r.opening_hours.weekday_text[new Date().getDay()===0?6:new Date().getDay()-1]}</div>`:(r.opening_hours?.raw?`<div class="card-hours">${r.opening_hours.raw}</div>`:'');const wantActive=status==='want_to_visit'?'active-want':'',visitedActive=status==='visited'?'active-visited':'',dismissActive=status==='dismissed'?'active-dismiss':'';const ratingHtml=r.rating?`<div class="rating-num">${r.rating.toFixed(1)}</div><div class="review-count">${r.review_count?r.review_count.toLocaleString()+' reviews':''}</div>`:'<div class="rating-num no-rating">-</div>';return `<div class="card" data-id="${r.id}"><div class="card-num">${i+1}</div><div class="card-body"><div class="card-name"><a href="${link}" target="_blank" rel="noopener">${r.name}</a></div><div class="card-address">${r.address}</div><div class="card-meta">${cuisineTags}${neighborhoodTag}${price}${sourceTag}</div>${hoursText}<div class="card-actions"><button class="action-btn ${wantActive}" onclick="setUserStatus('${r.id}','${status==='want_to_visit'?'new':'want_to_visit}')">&#9733; Want to visit</button><button class="action-btn ${visitedActive}" onclick="setUserStatus('${r.id}','${status==='visited'?'new':'visited}')">&#10003; Visited</button><button class="action-btn ${dismissActive}" onclick="setUserStatus('${r.id}','${status==='dismissed'?'new':'dismissed}')">&#10005; Dismiss</button></div></div><div class="card-right">${ratingHtml}<div class="first-seen">Added ${formatDate(r.first_seen)}</div>${newBadge}</div></div>`;}).join('');}
document.getElementById('filterSearch').addEventListener('input',()=>renderCards(filteredRestaurants()));
document.getElementById('filterCuisine').addEventListener('change',()=>renderCards(filteredRestaurants()));
document.getElementById('filterNeighborhood').addEventListener('change',()=>renderCards(filteredRestaurants()));
document.getElementById('filterRating').addEventListener('input',()=>renderCards(filteredRestaurants()));
document.getElementById('filterSort').addEventListener('change',()=>renderCards(filteredRestaurants()));
document.getElementById('filterSource').addEventListener('change',()=>renderCards(filteredRestaurants()));
document.querySelectorAll('#priceFilter .pill').forEach(btn=>{btn.addEventListener('click',()=>{document.querySelectorAll('#priceFilter .pill').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderCards(filteredRestaurants());});});
document.querySelectorAll('#statusFilter .pill').forEach(btn=>{btn.addEventListener('click',()=>{document.querySelectorAll('#statusFilter .pill').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderCards(filteredRestaurants());});});
document.getElementById('btnReset').addEventListener('click',()=>{document.getElementById('filterSearch').value='';document.getElementById('filterCuisine').value='';document.getElementById('filterNeighborhood').value='';document.getElementById('filterRating').value='0';document.getElementById('filterSort').value='rating';document.getElementById('filterSource').value='';document.querySelectorAll('#priceFilter .pill').forEach((b,i)=>b.classList.toggle('active',i===0));document.querySelectorAll('#statusFilter .pill').forEach((b,i)=>b.classList.toggle('active',i===0));renderCards(filteredRestaurants());});
fetch(DATA_URL).then(r=>r.json()).then(data=>{allRestaurants=data.restaurants||[];generatedAt=data.generated_at||'';document.getElementById('mastheadDate').textContent=formatDate(generatedAt.split('T')[0]);populateFilters(allRestaurants);renderCards(filteredRestaurants());}).catch(err=>{document.getElementById('cards').innerHTML='<div class="empty-state"><p>Could not load restaurant data. '+err.message+'</p></div>';});
</script>
</body>
</html>
