# Prague Restaurant Aggregator - Runtime Configuration

# Which adapters to run (comment out to disable)
adapters:
  - openstreetmap    # free, no key needed - bulk scan only
  - foursquare       # free tier, needs FOURSQUARE_API_KEY
  - google_places    # needs GOOGLE_PLACES_API_KEY - best data quality

# Store settings
store:
  path: docs/restaurants.json

# Dashboard output
dashboard:
  template: docs/_restaurants_template.html
  output: docs/restaurants.html

# Cross-source deduplication
deduplication:
  similarity_threshold: 0.85

# Logging
log_new_count: true
